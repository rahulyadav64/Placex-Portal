kind = "web"
previewPath = "/"
title = "Online Placement Portal"
version = "1.0.0"
id = "artifacts/placement-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18441

[services.development]
run = "pnpm --filter @workspace/placement-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/placement-portal", "run", "build" ]
publicDir = "artifacts/placement-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18441"
BASE_PATH = "/"
